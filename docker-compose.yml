version: '3.9'

services:
  backend:
    build: ./backend
    container_name: powder-roster-backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/powder_roster.db
      - SECRET_KEY=${SECRET_KEY:-change-me-please}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: powder-roster-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
